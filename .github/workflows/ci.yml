name: CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: sudo apt-get install -y librsvg2-bin

      - run: npm run build

      - run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - run: echo "VERSION=$(jq -r .version manifest.json)" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v7
        with:
          name: restore-maps-link-${{ env.VERSION }}-${{ env.SHORT_SHA }}
          path: |
            manifest.json
            content.js
            styles.css
            icon16.png
            icon48.png
            icon128.png
